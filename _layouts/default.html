<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif;
        }
        
        .font-display {
            font-family: 'Archivo', sans-serif;
            font-weight: 800;
            letter-spacing: -0.02em;
        }
        
        .nav-link {
            font-family: 'Archivo', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }
        
        .hero-blur {
            backdrop-filter: blur(8px);
            background: rgba(252, 188, 102, 0.15);
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        plum: '#584053',
                        teal: '#8DC6BF',
                        peach: '#FCBC66',
                        coral: '#F97B4F',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-stone-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white border-b border-stone-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <!-- Left: Logo + Home -->
                <div class="flex items-center gap-8">
                    <a href="/" class="font-display text-3xl text-plum hover:text-coral transition-colors">
                        acocado
                    </a>
                    <a href="/" class="nav-link text-stone-600 hover:text-plum transition-colors">
                        Home
                    </a>
                </div>
                
                <!-- Right: Navigation Links -->
                <div class="flex items-center gap-6">
                    <a href="/about.html" class="nav-link text-stone-600 hover:text-plum transition-colors">
                        About
                    </a>
                    <a href="/contact.html" class="nav-link text-stone-600 hover:text-plum transition-colors">
                        Contact
                    </a>
                    <a href="/faq.html" class="nav-link text-stone-600 hover:text-plum transition-colors">
                        FAQ
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        {{ content }}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-stone-200 mt-24">
        <div class="max-w-7xl mx-auto px-6 py-12">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-8">
                <!-- Column 1: Brand -->
                <div>
                    <h3 class="font-display text-2xl text-plum mb-3">acocado</h3>
                    <p class="text-stone-600 text-sm">
                        Curated electronics and vintage cameras shipped from the EU.
                    </p>
                </div>
                
                <!-- Column 2: Quick Links -->
                <div>
                    <h4 class="nav-link text-plum mb-3">Quick Links</h4>
                    <ul class="space-y-2 text-sm">
                        <li><a href="/" class="text-stone-600 hover:text-plum transition-colors">Products</a></li>
                        <li><a href="/about.html" class="text-stone-600 hover:text-plum transition-colors">About</a></li>
                        <li><a href="/contact.html" class="text-stone-600 hover:text-plum transition-colors">Contact</a></li>
                        <li><a href="/faq.html" class="text-stone-600 hover:text-plum transition-colors">FAQ</a></li>
                    </ul>
                </div>
                
                <!-- Column 3: Payment Methods -->
                <div>
                    <h4 class="nav-link text-plum mb-3">We Accept</h4>
                    <p class="text-stone-600 text-sm mb-2">Credit Cards via Stripe</p>
                    <p class="text-stone-600 text-sm">Bitcoin & Lightning Network</p>
                </div>
            </div>
            
            <div class="text-center pt-8 border-t border-stone-200">
                <p class="text-stone-500 text-sm">© 2026 {{ site.title }} • Premium electronics from Bulgaria</p>
            </div>
        </div>
    </footer>
</body>
</html>
