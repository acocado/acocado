<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap');
        
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #fdfdfd; /* Very light, warm off-white */
            color: #584053; /* Deep plum from palette */
        }
        
        .brand-text {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            letter-spacing: -0.05em;
        }

        .nav-link {
            color: #8DC6BF; /* Teal from palette */
            transition: color 0.2s ease;
        }
        
        .nav-link:hover {
            color: #F97B4F; /* Coral from palette */
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Navigation -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5">
            <div class="flex items-center justify-between">
                <!-- Left side: Logo & Home -->
                <div class="flex items-baseline gap-6">
                    <a href="/" class="brand-text text-3xl text-[#584053]">acocado</a>
                    <a href="/" class="hidden sm:block text-sm font-medium nav-link uppercase tracking-wider">Home</a>
                </div>
                
                <!-- Right side: Links -->
                <div class="flex items-center gap-6">
                    <a href="/about.html" class="text-sm font-medium nav-link uppercase tracking-wider">About</a>
                    <!-- FAQ and Contact disabled for now -->
                    <!-- <a href="/faq.html" class="text-sm font-medium nav-link uppercase tracking-wider">FAQ</a> -->
                    <!-- <a href="/contact.html" class="text-sm font-medium nav-link uppercase tracking-wider">Contact</a> -->
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow">
        {{ content }}
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-200 mt-20 bg-white">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
            <div class="flex flex-col items-center justify-center text-[#8DC6BF] text-sm">
                <p class="font-medium mb-2">acocado © 2026</p>
                <p>Curated Vintage & Modern Electronics</p>
            </div>
        </div>
    </footer>
</body>
</html>
